<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Repair | ROBUZTA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0369a1', // Robuzta Blue
                        secondary: '#0ea5e9', // Lighter Blue
                        dark: '#ffffff', // White
                        card: '#f8fafc', // Slate 50
                        success: '#10B981',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="favicon.ico">
</head>
<body class="bg-dark text-slate-900 font-sans antialiased overflow-x-hidden selection:bg-primary selection:text-slate-900">

    <header class="fixed w-full top-0 z-50 bg-dark/80 backdrop-blur-md border-b border-slate-200 py-4 shadow-lg">
        <div class="w-full px-6 lg:px-12 flex items-center justify-between">
                        <a href="../index.html" class="flex flex-col items-start justify-center group cursor-pointer hover:opacity-90 transition-opacity scale-90 origin-left">
                <div class="text-[32px] font-black tracking-[-0.05em] leading-none uppercase font-heading text-slate-900 flex items-center">
                    ROBU<span class="text-primary relative mx-[1px] inline-block">
                        Z
                        <span class="absolute top-[8px] left-0 w-full h-[2.5px] bg-white z-10"></span>
                        <span class="absolute bottom-[10px] left-0 w-full h-[2.5px] bg-white z-10"></span>
                    </span>TA
                </div>
                <div class="flex mt-0.5 ml-1 -skew-x-[15deg] text-[9px] font-bold tracking-[0.15em] uppercase overflow-hidden shadow-sm">
                    <div class="bg-primary text-white px-2 py-0.5 pl-2.5">TECH</div>
                    <div class="bg-slate-900 text-white px-2 py-0.5 pr-2.5">LABS</div>
                </div>
            </a>

            <nav class="hidden lg:flex items-center gap-8 font-medium">
                <a href="../index.html" class="hover:text-primary transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-primary after:transition-all hover:after:w-full">Home</a>
                <a href="services.html" class="hover:text-primary transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-primary after:transition-all hover:after:w-full">Services</a>
                <a href="about.html" class="hover:text-primary transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-primary after:transition-all hover:after:w-full">About Us</a>
                <a href="pricing.html" class="hover:text-primary transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-primary after:transition-all hover:after:w-full">Pricing</a>
                <a href="tracking.html" class="hover:text-primary transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-primary after:transition-all hover:after:w-full">Tracking</a>
                <a href="contact.html" class="hover:text-primary transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-primary after:transition-all hover:after:w-full">Contact</a>
            </nav>

                        <!-- Actions -->
            <div class="hidden lg:flex items-center gap-4">
                <button class="text-slate-900/80 hover:text-slate-900 transition-colors" aria-label="Toggle Search">
                    <i class="fa-solid fa-search text-lg"></i>
                </button>
                <div class="w-px h-6 bg-slate-200"></div>
                <a href="booking.html" class="group px-6 py-2.5 rounded-full bg-primary hover:bg-primary/90 font-medium text-white transition-all shadow-[0_0_15px_rgba(3,105,161,0.4)] hover:shadow-[0_0_25px_rgba(3,105,161,0.6)] flex items-center gap-2 transform hover:-translate-y-0.5">
                    <span>Book Repair</span>
                    <i class="fa-solid fa-arrow-right text-sm group-hover:translate-x-1.5 transition-transform duration-300"></i>
                </a>
            </div>
            
            <!-- Mobile Menu Toggle --><!-- Mobile Menu Toggle -->
            <button class="lg:hidden text-2xl text-slate-900/80 hover:text-slate-900 ml-4" aria-label="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="pt-32 pb-24 min-h-[80vh] flex flex-col justify-center">
        <div class="container mx-auto px-6 max-w-3xl">
            <div class="text-center mb-12" data-aos="fade-up">
                <h1 class="text-5xl font-bold font-heading mb-4">Track Your Repair</h1>
                <p class="text-slate-900/60">Enter your Repair ID to see real-time updates on your device's progress.</p>
            </div>
            
            <div class="bg-card border border-slate-200 rounded-3xl p-8 lg:p-12 shadow-2xl relative overflow-hidden" data-aos="fade-up" data-aos-delay="100">
                <form id="trackerFormFull" class="flex flex-col sm:flex-row gap-4">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-hashtag absolute left-5 top-1/2 -translate-y-1/2 text-slate-900/40"></i>
                        <input type="text" placeholder="Enter Repair ID (e.g., REP-1234)" class="w-full bg-dark border border-slate-200 rounded-xl py-4 pl-12 pr-4 text-slate-900 focus:outline-none focus:border-primary transition-colors placeholder:text-slate-900/30 text-lg" required>
                    </div>
                    <button type="submit" class="px-8 py-4 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold transition-colors whitespace-nowrap shadow-[0_0_15px_rgba(3,105,161,0.3)]">
                        Track Now
                    </button>
                </form>
                
                <!-- Demo Status (Hidden by default, shown via JS) -->
                <div id="demoStatusFull" class="mt-12 pt-8 border-t border-slate-200 opacity-0 transition-opacity duration-500 hidden">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="text-xl font-bold">Gaming PC - GPU Replacement</h4>
                        <span class="text-secondary text-sm font-bold px-3 py-1 bg-secondary/10 rounded-md">Repairing</span>
                    </div>
                    <div class="relative mt-8 pb-4">
                        <!-- Progress Line -->
                        <div class="absolute top-1/2 left-0 w-full h-1.5 bg-dark -translate-y-1/2 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-primary to-secondary w-[60%] rounded-full relative">
                                <div class="absolute right-0 top-0 bottom-0 w-10 bg-white/20 blur-md animate-pulse"></div>
                            </div>
                        </div>
                        
                        <!-- Steps -->
                        <div class="relative flex justify-between z-10">
                            <div class="flex flex-col items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-sm text-slate-900 shadow-[0_0_15px_rgba(230,0,0,0.5)]"><i class="fa-solid fa-check"></i></div>
                                <span class="text-xs text-slate-900/60 font-medium">Received</span>
                            </div>
                            <div class="flex flex-col items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-sm text-slate-900 shadow-[0_0_15px_rgba(230,0,0,0.5)]"><i class="fa-solid fa-check"></i></div>
                                <span class="text-xs text-slate-900/60 font-medium">Diagnosed</span>
                            </div>
                            <div class="flex flex-col items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center text-sm text-slate-900 shadow-[0_0_15px_rgba(255,51,51,0.5)] animate-pulse">
                                    <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
                                </div>
                                <span class="text-xs text-secondary font-bold">Repairing</span>
                            </div>
                            <div class="flex flex-col items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-dark border border-slate-300"></div>
                                <span class="text-xs text-slate-900/40 font-medium">Ready</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="../js/components.js"></script>
    <script src="../js/main.js?v=6"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/cursor.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/chatbot.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
        
        document.getElementById('trackerFormFull').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                
                const statusDiv = document.getElementById('demoStatusFull');
                statusDiv.classList.remove('hidden');
                setTimeout(() => {
                    statusDiv.style.opacity = '1';
                }, 50);
            }, 1000);
        });
    </script>
<script src="../js/auth.js?v=2"></script>
</body>
</html>
